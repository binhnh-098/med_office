spring.application.name=med_office
server.port=${PORT:8080}
spring.profiles.default=dev
spring.config.import=optional:file:.env[.properties]

spring.jpa.open-in-view=false
springdoc.swagger-ui.path=/swagger-ui.html
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

ai.provider=${AI_PROVIDER:nvidia}
ai.host=${AI_BASE_URL:https://integrate.api.nvidia.com/v1}
ai.api-key=${AI_API_KEY:}
ai.model=${AI_MODEL:meta/llama-3.1-70b-instruct}
ai.mock-on-error=${AI_MOCK_ON_ERROR:false}
ai.max-tokens=${AI_MAX_TOKENS:512}
ai.connect-timeout=${AI_CONNECT_TIMEOUT:5s}
ai.read-timeout=${AI_TIMEOUT_MS:30s}
