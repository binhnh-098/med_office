spring.datasource.url=${MED_OFFICE_DB_URL}
spring.datasource.username=${MED_OFFICE_DB_USERNAME}
spring.datasource.password=${MED_OFFICE_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:false}
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=none
