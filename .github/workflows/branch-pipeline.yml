name: Branch Pipeline

on:
  push:
    branches:
      - develop
      - staging
      - main
  pull_request:
    branches:
      - develop
      - staging
      - main

concurrency:
  group: branch-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

  deploy-development:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: development

    steps:
      - name: Development deploy placeholder
        run: echo "Deploy development build from develop branch"

  deploy-demo:
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: demo

    steps:
      - name: Demo deploy placeholder
        run: echo "Deploy demo build from staging branch"

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Deploy to production VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.PROD_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="/home/ubuntu/med_office"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull origin main
            chmod +x mvnw
            ./mvnw clean package -DskipTests
            sudo systemctl restart med-office
            sudo systemctl status med-office --no-pager
